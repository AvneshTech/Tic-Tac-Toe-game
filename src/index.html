<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Ambient background grid -->
    <div class="bg-grid"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <main class="app">
      <!-- Header -->
      <header class="header">
        <h1 class="title">TIC<span class="accent">·</span>TAC<span class="accent">·</span>TOE</h1>
        <div class="header-controls">
          <button class="icon-btn" id="sound-btn" title="Toggle Sound">
            <span id="sound-icon">🔊</span>
          </button>
          <button class="icon-btn" id="theme-btn" title="Toggle Theme">⚙</button>
        </div>
      </header>

      <!-- Mode Selector -->
      <div class="mode-selector">
        <button class="mode-btn active" id="pvp-btn">👥 2 Players</button>
        <button class="mode-btn" id="ai-btn">🤖 vs AI</button>
      </div>

      <!-- Score Board -->
      <div class="scoreboard">
        <div class="score-card" id="score-x">
          <div class="score-label">PLAYER X</div>
          <div class="score-value" id="x-score">0</div>
          <div class="score-wins">WINS</div>
        </div>
        <div class="score-card draw-card">
          <div class="score-label">DRAWS</div>
          <div class="score-value" id="draw-score">0</div>
          <div class="score-wins">&nbsp;</div>
        </div>
        <div class="score-card" id="score-o">
          <div class="score-label">PLAYER O</div>
          <div class="score-value" id="o-score">0</div>
          <div class="score-wins">WINS</div>
        </div>
      </div>

      <!-- Turn Indicator -->
      <div class="turn-indicator">
        <div class="turn-text">TURN: <span id="current-turn" class="turn-symbol x-color">X</span></div>
        <div class="turn-dots">
          <span class="dot active" id="dot-x"></span>
          <span class="dot" id="dot-o"></span>
        </div>
      </div>

      <!-- Game Board -->
      <div class="board-wrapper">
        <div class="game" id="game-board">
          <button class="box" data-index="0"></button>
          <button class="box" data-index="1"></button>
          <button class="box" data-index="2"></button>
          <button class="box" data-index="3"></button>
          <button class="box" data-index="4"></button>
          <button class="box" data-index="5"></button>
          <button class="box" data-index="6"></button>
          <button class="box" data-index="7"></button>
          <button class="box" data-index="8"></button>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-row">
        <button class="action-btn reset-btn" id="reset-btn">↺ New Round</button>
        <button class="action-btn danger-btn" id="clear-btn">✕ Reset Scores</button>
      </div>
    </main>

    <!-- Result Overlay -->
    <div class="overlay hide" id="overlay">
      <div class="result-card">
        <div class="result-icon" id="result-icon">🏆</div>
        <p class="result-msg" id="result-msg">Winner!</p>
        <div class="result-actions">
          <button class="action-btn" id="new-btn">Play Again</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
